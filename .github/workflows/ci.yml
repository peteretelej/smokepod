name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOLANGCI_LINT_VERSION: v2.8.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -v -race -p 1 ./...

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    # Lint is advisory - don't block PRs on opinionated linter rules
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./cmd/smokepod

      - name: Verify examples compile
        run: |
          cd examples/library-usage
          go build -v .

  action-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and install smokepod to PATH
        shell: bash
        run: |
          ext=""
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*) ext=".exe" ;;
          esac
          go build -o "smokepod${ext}" ./cmd/smokepod
          mkdir -p "$HOME/.local/bin"
          mv "smokepod${ext}" "$HOME/.local/bin/smokepod${ext}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Record fixture via action
        uses: ./
        with:
          install: 'false'
          mode: record
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/

      - name: Verify fixture via action
        uses: ./
        with:
          install: 'false'
          mode: verify
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/
