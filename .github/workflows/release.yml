name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  action-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and install smokepod to PATH
        shell: bash
        run: |
          ext=""
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*) ext=".exe" ;;
          esac
          go build -o "smokepod${ext}" ./cmd/smokepod
          mkdir -p "$HOME/.local/bin"
          mv "smokepod${ext}" "$HOME/.local/bin/smokepod${ext}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Record fixture via action
        uses: ./
        with:
          install: 'false'
          mode: record
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/

      - name: Verify fixture via action
        uses: ./
        with:
          install: 'false'
          mode: verify
          target: ${{ runner.os == 'Windows' && 'cmd.exe' || '/bin/sh' }}
          tests: testdata/fixtures/simple.test
          fixtures: testdata/action-fixtures/

  npm-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build local smokepod binary
        shell: bash
        run: |
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi

          go build -o "$RUNNER_TEMP/smokepod$ext" ./cmd/smokepod

      - name: Pack wrapper and verify tarball contents
        shell: bash
        run: |
          pack_json=$(cd npm && npm pack --json)
          tarball=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data[0].filename);" "$pack_json")
          echo "SMOKEPOD_TARBALL=$PWD/npm/$tarball" >> "$GITHUB_ENV"
          tar -tf "$PWD/npm/$tarball"

          for required in \
            package/package.json \
            package/install.mjs \
            package/README.md \
            package/bin/run.js \
            package/vendor/.gitkeep
          do
            tar -tf "$PWD/npm/$tarball" | grep -Fx "$required" >/dev/null
          done

      - name: Install packed wrapper into sample project
        shell: bash
        run: |
          ext=""
          vendor_binary="smokepod"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
            vendor_binary="smokepod.exe"
          fi

          sample_dir="$RUNNER_TEMP/npm-smoke-sample"
          mkdir -p "$sample_dir"
          cat <<'EOF' > "$sample_dir/package.json"
          {
            "name": "smokepod-npm-smoke",
            "private": true,
            "type": "module"
          }
          EOF

          (
            cd "$sample_dir"
            SMOKEPOD_BINARY="$RUNNER_TEMP/smokepod$ext" npm install "$SMOKEPOD_TARBALL"
          )

          test -f "$sample_dir/node_modules/smokepod/vendor/$vendor_binary"
          (
            cd "$sample_dir"
            npx --no-install smokepod --version
          )

  release:
    needs: [action-test, npm-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm package version from tag
        working-directory: npm
        shell: bash
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
