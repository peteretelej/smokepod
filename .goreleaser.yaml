version: 2

builds:
  - main: ./cmd/smokepod
    binary: smokepod
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/peteretelej/smokepod/pkg/smokepod.Version={{.Version}}
      - -X github.com/peteretelej/smokepod/pkg/smokepod.Commit={{.Commit}}
      - -X github.com/peteretelej/smokepod/pkg/smokepod.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
