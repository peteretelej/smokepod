name: 'Smokepod'
description: 'Run smoke tests with smokepod - record, verify, or run CLI tests'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  mode:
    description: 'record, verify, or run'
    required: true
  target:
    description: 'Path to the target executable (e.g. /bin/sh, cmd.exe, ./my-tool)'
    required: false
  target-args:
    description: 'Fixed arguments for the target executable, one per line (newline-delimited). Each line becomes a separate argument.'
    required: false
    default: ''
  tests:
    description: 'Path to .test files'
    required: false
  fixtures:
    description: 'Path to fixtures directory'
    required: false
  config:
    description: 'Path to smokepod.yaml (for run mode)'
    required: false
  target-mode:
    description: 'Target mode: shell (runs target -c <command>) or process (JSONL over stdin/stdout)'
    default: 'shell'
  fail-fast:
    description: 'Stop on first failure'
    default: 'false'
  timeout:
    description: 'Per-command timeout (e.g. 30s, 1m)'
    required: false
  run:
    description: 'Comma-separated section names to run'
    required: false
  json:
    description: 'Output results as JSON'
    default: 'false'
  install:
    description: 'Whether to download and install smokepod (set to false if already on PATH)'
    default: 'true'
  version:
    description: 'Smokepod version to install'
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install smokepod
      if: ${{ inputs.install != 'false' }}
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        # Fallback for self-hosted runners where RUNNER_TEMP may be unset.
        # Convert to Unix-style path so Git Bash tools work on Windows.
        RUNNER_TEMP="$(cd "${RUNNER_TEMP:-${TMPDIR:-/tmp}}" && pwd)"

        # Detect OS
        case "$(uname -s)" in
          Linux*)   os=linux ;;
          Darwin*)  os=darwin ;;
          MINGW*|MSYS*|CYGWIN*) os=windows ;;
          *)        echo "Unsupported OS: $(uname -s)"; exit 1 ;;
        esac

        # Detect architecture
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
          arm64)   ARCH="arm64" ;;
          *)       echo "Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # Derive .exe suffix from normalized OS
        ext=""
        if [ "$os" = "windows" ]; then ext=".exe"; fi

        # Resolve version
        VERSION="${INPUT_VERSION}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -sSL "https://api.github.com/repos/peteretelej/smokepod/releases/latest" | grep '"tag_name"' | sed -E 's/.*"tag_name":\s*"([^"]+)".*/\1/')
        fi

        # Strip leading v for download URL
        VERSION_NUM="${VERSION#v}"

        BINARY="smokepod_${os}_${ARCH}${ext}"
        BASE_URL="https://github.com/peteretelej/smokepod/releases/download/${VERSION}"

        echo "Installing smokepod ${VERSION} (${os}/${ARCH})"

        # Download binary and checksums
        curl -sSL "${BASE_URL}/${BINARY}" -o "smokepod${ext}"
        curl -sSL "${BASE_URL}/checksums.txt" -o checksums.txt

        # Verify checksum
        EXPECTED=$(grep "${BINARY}" checksums.txt | awk '{print $1}')
        if [ -z "$EXPECTED" ]; then
          echo "Error: checksum not found for ${BINARY}"
          exit 1
        fi

        if command -v sha256sum &> /dev/null; then
          ACTUAL=$(sha256sum "smokepod${ext}" | awk '{print $1}')
        else
          ACTUAL=$(shasum -a 256 "smokepod${ext}" | awk '{print $1}')
        fi

        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "Checksum mismatch!"
          echo "  Expected: $EXPECTED"
          echo "  Actual:   $ACTUAL"
          exit 1
        fi

        chmod +x "smokepod${ext}"

        # Install to a dedicated directory and add to PATH
        mkdir -p "${RUNNER_TEMP}/smokepod-bin"
        mv "smokepod${ext}" "${RUNNER_TEMP}/smokepod-bin/smokepod${ext}"
        echo "${RUNNER_TEMP}/smokepod-bin" >> "$GITHUB_PATH"
        export PATH="${RUNNER_TEMP}/smokepod-bin:$PATH"
        rm -f checksums.txt

        "${RUNNER_TEMP}/smokepod-bin/smokepod${ext}" --version

    - name: Run smokepod
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_TARGET_ARGS: ${{ inputs.target-args }}
        INPUT_TESTS: ${{ inputs.tests }}
        INPUT_FIXTURES: ${{ inputs.fixtures }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_TARGET_MODE: ${{ inputs.target-mode }}
        INPUT_FAIL_FAST: ${{ inputs.fail-fast }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_RUN: ${{ inputs.run }}
        INPUT_JSON: ${{ inputs.json }}
      run: |
        set -euo pipefail

        ARGS=()

        # Parse target-args (newline-delimited) into a shell-safe array
        TARGET_ARGS=()
        if [ -n "$INPUT_TARGET_ARGS" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            TARGET_ARGS+=("--target-arg" "$line")
          done <<< "$INPUT_TARGET_ARGS"
        fi

        case "$INPUT_MODE" in
          record)
            ARGS+=("record")
            ARGS+=("--target" "$INPUT_TARGET")
            ARGS+=("--tests" "$INPUT_TESTS")
            ARGS+=("--fixtures" "$INPUT_FIXTURES")
            ARGS+=("--update")
            if [ ${#TARGET_ARGS[@]} -gt 0 ]; then
              ARGS+=("${TARGET_ARGS[@]}")
            fi
            if [ -n "$INPUT_TIMEOUT" ]; then
              ARGS+=("--timeout" "$INPUT_TIMEOUT")
            fi
            if [ -n "$INPUT_RUN" ]; then
              ARGS+=("--run" "$INPUT_RUN")
            fi
            ;;
          verify)
            ARGS+=("verify")
            ARGS+=("--target" "$INPUT_TARGET")
            ARGS+=("--tests" "$INPUT_TESTS")
            ARGS+=("--fixtures" "$INPUT_FIXTURES")
            ARGS+=("--mode" "$INPUT_TARGET_MODE")
            if [ ${#TARGET_ARGS[@]} -gt 0 ]; then
              ARGS+=("${TARGET_ARGS[@]}")
            fi
            if [ "$INPUT_FAIL_FAST" = "true" ]; then
              ARGS+=("--fail-fast")
            fi
            if [ -n "$INPUT_TIMEOUT" ]; then
              ARGS+=("--timeout" "$INPUT_TIMEOUT")
            fi
            if [ "$INPUT_JSON" = "true" ]; then
              ARGS+=("--json")
            fi
            if [ -n "$INPUT_RUN" ]; then
              ARGS+=("--run" "$INPUT_RUN")
            fi
            ;;
          run)
            if [ -z "$INPUT_CONFIG" ]; then
              echo "Error: 'config' input is required for mode 'run'"
              exit 1
            fi
            ARGS+=("run" "$INPUT_CONFIG")
            if [ "$INPUT_FAIL_FAST" = "true" ]; then
              ARGS+=("--fail-fast")
            fi
            if [ -n "$INPUT_TIMEOUT" ]; then
              ARGS+=("--timeout" "$INPUT_TIMEOUT")
            fi
            ;;
          *)
            echo "Error: invalid mode '$INPUT_MODE'. Must be record, verify, or run."
            exit 1
            ;;
        esac

        smokepod "${ARGS[@]}"
